<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Contact | Umbrella Technologies</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="css/styles.css" rel="stylesheet">
</head>
<body>

<!-- Hero -->
<div class="pg-hero">
    <div class="pg-shape pg-shape-1"></div>
    <div class="pg-shape pg-shape-2"></div>
    <div class="container position-relative" style="z-index:2">
        <div class="row align-items-center">
            <div class="col-lg-7">
                <div class="bc mb-3"><a href="index.html">Home</a> <span class="mx-2">/</span> <span style="color:#fff">Contact</span></div>
                <h1>Contact <span style="color:var(--y)">Us</span></h1>
                <p>Let's start a conversation about your next project.</p>
            </div>
            <div class="col-lg-5 d-none d-lg-flex justify-content-center">
                <svg viewBox="0 0 200 200" width="160" style="opacity:.5">
                    <circle cx="100" cy="100" r="80" fill="none" stroke="rgba(255,214,0,.2)" stroke-width="1"/>
                    <circle cx="100" cy="100" r="55" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="1"/>
                    <text x="100" y="100" text-anchor="middle" fill="rgba(255,214,0,.4)" font-size="36">&#9993;</text>
                    <text x="100" y="125" text-anchor="middle" fill="rgba(255,255,255,.25)" font-size="9" letter-spacing="3" font-family="Space Mono,monospace">GET IN TOUCH</text>
                </svg>
            </div>
        </div>
    </div>
    <div class="pg-wave">
        <svg viewBox="0 0 1440 80" preserveAspectRatio="none" style="height:60px">
            <path d="M0,40 C360,80 720,0 1080,40 C1260,60 1380,50 1440,40 L1440,80 L0,80 Z" fill="var(--bg)"/>
        </svg>
    </div>
</div>

<!-- Contact Info + Form -->
<section style="background:var(--bg)">
    <div class="container">
        <div class="row g-3">
            <div class="col-lg-4">
                <div class="row g-3">
                    <div class="col-12">
                        <div class="g-card cc">
                            <div class="cc-ico"><i class="fas fa-phone"></i></div>
                            <h5>Call</h5>
                            <p><a href="tel:+260973297566">+260 96 0847099</a></p>
                        </div>
                    </div>
                    <div class="col-12">
                        <div class="g-card cc">
                            <div class="cc-ico"><i class="fas fa-envelope"></i></div>
                            <h5>Email</h5>
                            <p>
                                <a href="mailto:umbrellatechnologies21@gmail.com">umbrellatechnologies21@gmail.com</a>
                            </p>
                        </div>
                    </div>
                    <div class="col-12">
                        <div class="g-card cc">
                            <div class="cc-ico"><i class="fab fa-facebook-f"></i></div>
                            <h5>Facebook</h5>
                            <p><a href="https://facebook.com/umbrellatechnologies" target="_blank">/umbrellatechnologies</a></p>
                        </div>
                    </div>
                    <div class="col-12">
                        <div class="g-card cc">
                            <div class="cc-ico"><i class="fas fa-certificate"></i></div>
                            <h5>PACRA</h5>
                            <p>320210024160 &bull; Est. May 2021</p>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-8">
                <div class="g-card" style="height:100%">
                    <h4 style="font-size:1rem;margin-bottom:1rem;color:var(--t);font-family:'Space Mono',monospace">Send a <span style="color:var(--y)">Message</span></h4>
                    <form id="cf">
                        <div class="row g-3">
                            <div class="col-md-6"><input type="text" name="name" class="fi" placeholder="Name" required></div>
                            <div class="col-md-6"><input type="email" name="email" class="fi" placeholder="Email" required></div>
                            <div class="col-md-6"><input type="tel" name="phone" class="fi" placeholder="Phone"></div>
                            <div class="col-md-6">
                                <select name="service" class="fi">
                                    <option value="" disabled selected>Service</option>
                                    <option>ICT Consultancy</option>
                                    <option>Software Dev</option>
                                    <option>Hardware</option>
                                    <option>Rebranding</option>
                                    <option>Logo Design</option>
                                    <option>Company Profile</option>
                                    <option>Video Ads</option>
                                    <option>Print Design</option>
                                    <option>Other</option>
                                </select>
                            </div>
                            <div class="col-12"><textarea name="message" class="fi" rows="4" placeholder="Your project..." required></textarea></div>
                            <div class="col-12"><button type="submit" class="btn-send"><i class="fas fa-paper-plane me-2"></i>Send</button></div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- Google Map -->
<section style="background:var(--bg2);padding:2.5rem 0 4rem">
    <div class="container">
        <div class="text-center mb-4">
            <p class="sl">// LOCATION</p>
            <div class="yb mx-auto"></div>
            <h2 class="st">Find Us</h2>
        </div>
        <div class="map-c">
            <iframe
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d62208.9!2d28.5959!3d-12.9588!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x196ce0706a09903f%3A0x6b73082d4c4a4fa5!2sNdola%2C%20Zambia!5e0!3m2!1sen!2szm!4v1700000000000!5m2!1sen!2szm"
                allowfullscreen
                loading="lazy"
                referrerpolicy="no-referrer-when-downgrade">
            </iframe>
        </div>
    </div>
</section>

<!-- Scripts at the very end -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/components.js"></script>
<script src="js/main.js"></script>
</body>
</html>
